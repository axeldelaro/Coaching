<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>RECOMP — Coach de remise en forme</title>
  <meta name="description" content="Ton compagnon de remise en forme : entraînements guidés, nutrition et suivi de progression. 100 % hors-ligne.">
  <meta name="theme-color" content="#F4F6FA" id="tc">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Anti-flash : thème clair par défaut + couleur d'accent avant le 1er rendu -->
  <script>
    (function () {
      var theme = localStorage.getItem('rc_theme') || 'light';
      var dark = theme === 'dark' || (theme === 'auto' && matchMedia('(prefers-color-scheme: dark)').matches);
      document.documentElement.dataset.theme = dark ? 'dark' : 'light';
      var accent = localStorage.getItem('rc_accent') || '#2F80ED';
      document.documentElement.style.setProperty('--accent', accent);
      var fs = localStorage.getItem('rc_fontsize') || '16';
      document.documentElement.style.fontSize = fs + 'px';
      var tc = document.getElementById('tc');
      if (tc) tc.content = dark ? '#0F131A' : '#F4F6FA';
    })();
  </script>

  <!-- Police : Inter (interface santé, très lisible) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Le deck (bandeau + 5 panneaux) est injecté par app.js via mountShell() -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- Scripts : ordre strict -->
  <script src="js/config.js"></script>
  <script src="js/exercises.js"></script>
  <script src="js/knowledge.js"></script>
  <script src="js/data.js"></script>
  <script src="js/coach.js"></script>
  <script src="js/rpg.js"></script>
  <script src="js/music.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
